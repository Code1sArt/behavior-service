version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    container_name: smart_school_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: behavior_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
